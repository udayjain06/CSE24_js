<!DOCTYPE html>
<html>
<head>
  <title>Student Result Program</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      transition: background-color 1s ease;
    }
    h2 {
      color: #333;
    }
    #output {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      padding: 15px;
      border-radius: 8px;
      display: inline-block;
      background: #f4f4f4;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    .pass {
      color: green;
    }
    .fail {
      color: red;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    button {
      margin-top: 10px;
      padding: 8px 15px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #007BFF;
      color: white;
      transition: background 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h2>Student Result Program</h2>
  Enter Number of Subjects:
  <input type="number" id="sub">
  <button onclick="calculateResult()">Calculate</button>
  <div id="output"></div>

  <script>
    function calculateResult(){
      var subjects = document.getElementById("sub").value;
      var total = 0;

      for(var i=1; i <= subjects; i++){
        var marks = prompt("Enter marks of subject " + i);
        total += Number(marks);
      }

      var average = total / subjects;
      var grade, result;

      if(average >= 60){
        grade = "A";
        result = "Pass";
      } else if(average >= 50){
        grade = "B";
        result = "Pass";
      } else if(average >= 40){
        grade = "C";
        result = "Pass";
      } else {
        grade = "D";
        result = "Fail";
      }

      var outputDiv = document.getElementById("output");
      outputDiv.innerHTML =
        "Total Marks = " + total + "<br>" +
        "Average Marks = " + average.toFixed(2) + "<br>" +
        "Grade = " + grade + "<br>" +
        "Result = " + result;

      if(result === "Pass"){
        document.body.style.backgroundColor = "lightgreen";
        outputDiv.className = "pass";
      } else {
        document.body.style.backgroundColor = "lightcoral";
        outputDiv.className = "fail";
      }
    }
  </script>
</body>
</html>
