<!DOCTYPE html>
<html>
<head>
 <title>Dynamic Content Changer</title>
</head>
<style>
body {
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 background-color: #f0f0f0;
 margin: 0;
 padding: 0;
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100vh;
 color: #333;
}
.container {
 width: 90%;
 max-width: 700px;
 margin: 20px;
 padding: 30px;
 background: white;
 border-radius: 15px;
 box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
 text-align: center;
}
h2#mainHeading {
 font-size: 2.5em;
 margin-bottom: 20px;
 color: #4a4a4a;
}
input#userInput {
 padding: 12px 15px;
 width: 100%;
 max-width: 400px;
 border: 2px solid #ddd;
 border-radius: 25px;
 font-size: 16px;
 margin: 20px 0;
 outline: none;
 transition: border-color 0.3s ease;
}
input#userInput:focus {
 border-color: #667eea;
}
button {
 padding: 12px 20px;
 background-color: #667eea;
 color: white;
 border: none;
 border-radius: 25px;
 cursor: pointer;
 font-size: 14px;
 font-weight: bold;
 text-transform: uppercase;
 letter-spacing: 1px;
 transition: background-color 0.3s ease;
 box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
 margin: 5px;
}
button:hover {
 background-color: #764ba2;
}
p#paragraph {
 font-size: 18px;
 line-height: 1.6;
 margin-top: 30px;
 padding: 20px;
 background-color: #f8f9fa;
 border-radius: 10px;
 border-left: 5px solid #667eea;
 transition: font-size 0.3s ease;
}
</style>
<body>
<div class="container">
 <h2 id="mainHeading">Welcome to JavaScript Lab</h2>
 <input type="text" id="userInput" placeholder="Enter new heading text">
 <br><br>
 <button id="changeTextBtn">Change Heading</button>
 <button id="bgColorBtn">Change Background</button>
 <button id="fontSizeBtn">Increase Font Size</button>
 <button id="toggleBtn">Show/Hide Paragraph</button>
 <button id="resetBtn">Reset</button>
 <p id="paragraph">
 This is a sample paragraph. JavaScript events can dynamically change content.
 </p>
</div>
<script>
let heading = document.getElementById("mainHeading");
let paragraph = document.getElementById("paragraph");
let input = document.getElementById("userInput");
let fontSize = 16;
document.getElementById("changeTextBtn").addEventListener("click", function () {
 if (input.value !== "") {
 heading.innerHTML = input.value;
 }
});
document.getElementById("bgColorBtn").onclick = function () {
 document.body.style.backgroundColor ="red";

};
document.getElementById("fontSizeBtn").addEventListener("click", function () {
 fontSize += 2;
 paragraph.style.fontSize = fontSize + "px";
});
document.getElementById("toggleBtn").addEventListener("click", function () {
 if (paragraph.style.display === "none") {
 paragraph.style.display = "block";
 } else {
 paragraph.style.display = "none";
 }
});
document.getElementById("resetBtn").addEventListener("click", function () {
 heading.innerHTML = "Welcome to JavaScript Lab";
 paragraph.style.display = "block";
 paragraph.style.fontSize = "16px";
 document.body.style.backgroundColor = "#f4f4f4";
 input.value = "";
 fontSize = 16;
});
</script>
<!-- Uday Jain Cse-24 -->
</body>
</html>
